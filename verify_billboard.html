<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>3D 機台模型驗證工具 (15機型)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #222;
            color: white;
            font-family: sans-serif;
        }

        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
        }

        #status {
            color: #00ff00;
            font-weight: bold;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #444;
            color: white;
            border: 1px solid #666;
            border-radius: 5px;
        }

        button:hover {
            background: #555;
        }
    </style>
    <script type="importmap">
        {
          "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
          }
        }
    </script>
</head>

<body>
    <div id="info">
        <h3>3D 機台模型驗證 (15機型)</h3>
        <p>機型: <span id="model-name">加載中...</span></p>
        <p>尺寸: <span id="model-dim">N/A</span></p>
        <div id="status">正在初始化...</div>
    </div>
    <div id="controls">
        <button id="prev">上一個</button>
        <button id="next">下一個</button>
    </div>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, currentMesh;
        let models = [];
        let currentIndex = 0;

        init();
        loadModelList();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(2, 2, 4);
            camera.lookAt(0, 1, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const grid = new THREE.GridHelper(10, 10);
            scene.add(grid);

            const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
            scene.add(ambientLight);

            window.addEventListener('resize', onWindowResize);
            document.getElementById('prev').onclick = () => showModel(currentIndex - 1);
            document.getElementById('next').onclick = () => showModel(currentIndex + 1);

            animate();
        }

        function loadModelList() {
            models = [
                { name: "Ai4-免換袋 1.8", w: 1.803, h: 2.2, d: 1.129, color: "#F8C700", img: "./assets/models/ai4_1.8/front.png", imgL: "./assets/models/ai4_1.8/left.png", imgR: "./assets/models/ai4_1.8/right.png" },
                { name: "Ai4-免換袋 2.1", w: 2.083, h: 2.2, d: 1.129, color: "#F8C700", img: "./assets/models/ai4_2.1/front.png", imgL: "./assets/models/ai4_2.1/left.png", imgR: "./assets/models/ai4_2.1/right.png" },
                { name: "Ai4-免換袋 2.7", w: 2.683, h: 2.2, d: 1.18, color: "#F8C700", img: "./assets/models/ai4_2.7/front.png", imgL: "./assets/models/ai4_2.7/left.png", imgR: "./assets/models/ai4_2.7/right.png" },
                { name: "Ai4-全聯免換袋 1.8", w: 1.803, h: 2.2, d: 1.129, color: "#F8C700", img: "./assets/models/px_ai4_1.8/front.png" },
                { name: "Ai4-全聯免換袋 2.1", w: 2.083, h: 2.2, d: 1.129, color: "#F8C700", img: "./assets/models/px_ai4_2.1/front.png", imgL: "./assets/models/px_ai4_2.1/left.png", imgR: "./assets/models/px_ai4_2.1/right.png" },
                { name: "Ai4-全聯免換袋 2.7", w: 2.683, h: 2.2, d: 1.18, color: "#F8C700", img: "./assets/models/px_ai4_2.7/front.png", imgR: "./assets/models/px_ai4_2.7/right.png" },
                { name: "Ai4-標準單機+瓶蓋箱", w: 1.115, h: 1.9, d: 0.93, color: "#EA5106", img: "./assets/models/ai4_cap/front.png" },
                { name: "Ai4-全聯單機+瓶蓋箱", w: 1.115, h: 1.9, d: 0.93, color: "#F8C700", img: "./assets/models/px_ai4_cap/front.png", imgL: "./assets/models/px_ai4_cap/left.png", imgR: "./assets/models/px_ai4_cap/right.png" },
                { name: "台塑-洗寶", w: 0.85, h: 1.8, d: 0.67, color: "#CCE0ED", img: "./assets/models/formosa_v1/front.png", imgL: "./assets/models/formosa_v1/left.png" },
                { name: "台塑-水精靈", w: 0.88, h: 1.9, d: 0.85, color: "#000000", img: "./assets/models/formosa_v2/front.png", imgL: "./assets/models/formosa_v2/left.png", imgR: "./assets/models/formosa_v2/right.png" },
                { name: "電池機 v2", w: 0.41, h: 1.623, d: 0.478, color: "#E9CA4D", img: "./assets/models/battery_v2/front.png", imgR: "./assets/models/battery_v2/right.png" },
                { name: "電池機 v3 (室內)", w: 0.41, h: 1.75, d: 0.34, color: "#FFFFFF", img: "./assets/models/battery_v3_in/front.png", imgL: "./assets/models/battery_v3_in/left.png", imgR: "./assets/models/battery_v3_in/right.png" },
                { name: "電池機 v3 (室外)", w: 0.41, h: 1.75, d: 0.34, color: "#FFFFFF", img: "./assets/models/battery_v3_out/front.png", imgL: "./assets/models/battery_v3_out/left.png", imgR: "./assets/models/battery_v3_out/right.png" },
                { name: "H30 整合機", w: 1.4, h: 2.05, d: 0.908, color: "#F8C700", img: "./assets/models/h30/front.png", imgL: "./assets/models/h30/left.png", imgR: "./assets/models/h30/right.png" },
                { name: "特力屋 2.7", w: 2.683, h: 2.2, d: 1.18, color: "#F8C700", img: "./assets/models/tlw/front.png", imgL: "./assets/models/tlw/left.png", imgR: "./assets/models/tlw/right.png" }
            ];
            showModel(0);
        }

        function showModel(index) {
            if (index < 0) index = models.length - 1;
            if (index >= models.length) index = 0;
            currentIndex = index;

            const def = models[currentIndex];
            document.getElementById('model-name').textContent = def.name;
            document.getElementById('model-dim').textContent = `${def.w}m x ${def.h}m x ${def.d}m`;
            document.getElementById('status').innerHTML = "正在加載貼圖...";

            if (currentMesh) scene.remove(currentMesh);

            const textureLoader = new THREE.TextureLoader();
            const materials = [];
            const themeColor = new THREE.Color(def.color || "#888888");

            const faceConfigs = [
                { src: def.imgR || def.img, color: 0xffffff }, // 右
                { src: def.imgL || def.img, color: 0xffffff }, // 左
                { src: null, color: themeColor },              // 上
                { src: null, color: themeColor },              // 下
                { src: def.img, color: 0xffffff },             // 正
                { src: null, color: themeColor }               // 背
            ];

            let loadedCount = 0;
            faceConfigs.forEach((config, i) => {
                if (config.src) {
                    textureLoader.load(config.src,
                        (tex) => {
                            tex.colorSpace = THREE.SRGBColorSpace;
                            materials[i] = new THREE.MeshBasicMaterial({
                                map: tex,
                                transparent: !!config.src.includes('.png'),
                                alphaTest: 0.1
                            });
                            checkReady();
                        },
                        undefined,
                        (err) => {
                            console.error("🔴 加載失敗:", config.src);
                            materials[i] = new THREE.MeshBasicMaterial({ color: 0xff0000 });
                            checkReady();
                        }
                    );
                } else {
                    materials[i] = new THREE.MeshBasicMaterial({ color: config.color });
                    checkReady();
                }
            });

            function checkReady() {
                loadedCount++;
                if (loadedCount === 6) {
                    const geometry = new THREE.BoxGeometry(def.w, def.h, def.d);
                    geometry.translate(0, def.h / 2, 0);
                    currentMesh = new THREE.Mesh(geometry, materials);
                    scene.add(currentMesh);

                    const failed = faceConfigs.some((s, idx) => s && materials[idx].map === null && materials[idx].color?.getHex() === 0xff0000);
                    if (failed) {
                        document.getElementById('status').innerHTML = "⚠️ 部分面加載失敗 (紅色)";
                        document.getElementById('status').style.color = "orange";
                    } else {
                        document.getElementById('status').innerHTML = "✅ 3D 模型加載、貼圖正常";
                        document.getElementById('status').style.color = "#00ff00";
                    }
                }
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (currentMesh) {
                currentMesh.rotation.y += 0.005;
            }
            renderer.render(scene, camera);
        }
    </script>
</body>

</html>
