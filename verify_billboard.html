<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>3D 機台模型驗證工具 (15機型)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #222;
            color: white;
            font-family: sans-serif;
        }

        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
        }

        #status {
            color: #00ff00;
            font-weight: bold;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #444;
            color: white;
            border: 1px solid #666;
            border-radius: 5px;
        }

        button:hover {
            background: #555;
        }
    </style>
    <script type="importmap">
        {
          "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
          }
        }
    </script>
</head>

<body>
    <div id="info">
        <h3>3D 機台模型驗證 (15機型)</h3>
        <p>機型: <span id="model-name">加載中...</span></p>
        <p>尺寸: <span id="model-dim">N/A</span></p>
        <div id="status">正在初始化...</div>
    </div>
    <div id="controls">
        <button id="prev">上一個</button>
        <button id="next">下一個</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, currentMesh, controls;
        let models = [];
        let currentIndex = 0;

        init();
        loadModelList();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(2, 2, 4);
            camera.lookAt(0, 1, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const grid = new THREE.GridHelper(10, 10);
            scene.add(grid);

            const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
            scene.add(ambientLight);

            // 加入軌道控制器，讓使用者可用滑鼠旋轉視角
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; // 增加拖拉彈性
            controls.dampingFactor = 0.05;

            window.addEventListener('resize', onWindowResize);
            document.getElementById('prev').onclick = () => showModel(currentIndex - 1);
            document.getElementById('next').onclick = () => showModel(currentIndex + 1);

            animate();
        }

        function loadModelList() {
            models = [
                { name: "電池機 v2 (戶外)", w: 0.41, h: 1.623, d: 0.478, color: "#E9CA4D", img: "./assets/models/battery_v2/front.png", imgL: "./assets/models/battery_v2/left.png", imgR: "./assets/models/battery_v2/right.png", imgB: "./assets/models/battery_v2/back.png", imgT: "./assets/models/battery_v2/top.png" },
                { name: "電池機 v3 (室內)", w: 0.41, h: 1.75, d: 0.34, color: "#FFFFFF", img: "./assets/models/battery_v3_in/front.png", imgL: "./assets/models/battery_v3_in/left.png", imgR: "./assets/models/battery_v3_in/right.png", imgB: "./assets/models/battery_v3_in/back.png", imgT: "./assets/models/battery_v3_in/top.png" },
                { name: "電池機 v3 (室外)", w: 0.41, h: 1.75, d: 0.34, color: "#FFFFFF", img: "./assets/models/battery_v3_out/front.png", imgL: "./assets/models/battery_v3_out/left.png", imgR: "./assets/models/battery_v3_out/right.png", imgB: "./assets/models/battery_v3_out/back.png", imgT: "./assets/models/battery_v3_out/top.png" },
                { name: "H30 整合機", w: 1.21, h: 2.05, d: 0.908, color: "#F8C700", img: "./assets/models/h30/front.png", imgL: "./assets/models/h30/left.png", imgR: "./assets/models/h30/right.png", imgB: "./assets/models/h30/back.png", imgT: "./assets/models/h30/top.png" },
                { name: "Ai4-免換袋 2.7", w: 2.683, h: 2.2, d: 1.18, color: "#F8C700", img: "./assets/models/ai4_2.7/front.png", imgL: "./assets/models/ai4_2.7/left.png", imgR: "./assets/models/ai4_2.7/right.png", imgB: "./assets/models/ai4_2.7/back.png", imgT: "./assets/models/ai4_2.7/top.png" },
                { name: "Ai4-免換袋 2.1", w: 2.083, h: 2.2, d: 1.129, color: "#F8C700", img: "./assets/models/ai4_2.1/front.png", imgL: "./assets/models/ai4_2.1/left.png", imgR: "./assets/models/ai4_2.1/right.png", imgB: "./assets/models/ai4_2.1/back.png", imgT: "./assets/models/ai4_2.1/top.png" },
                { name: "Ai4-免換袋 1.8", w: 1.803, h: 2.2, d: 1.129, color: "#F8C700", img: "./assets/models/ai4_1.8/front.png", imgL: "./assets/models/ai4_1.8/left.png", imgR: "./assets/models/ai4_1.8/right.png", imgB: "./assets/models/ai4_1.8/back.png", imgT: "./assets/models/ai4_1.8/top.png" },
                { name: "Ai4-單機", w: 0.88, h: 1.891, d: 0.897, color: "#EA5106", img: "./assets/models/ai4_single/front.png", imgL: "./assets/models/ai4_single/left.png", imgR: "./assets/models/ai4_single/right.png", imgB: "./assets/models/ai4_single/back.png", imgT: "./assets/models/ai4_single/top.png", hasCap:true, capW:0.235, capH:0.93, capD:0.305, capImg:"./assets/models/ai4_cap/front.png", capImgL: "./assets/models/ai4_cap/left.png", capImgR: "./assets/models/ai4_cap/right.png", capImgB: "./assets/models/ai4_cap/back.png", capImgT: "./assets/models/ai4_cap/top.png" },
                { name: "全聯 Ai4-2.7", w: 2.683, h: 2.2, d: 1.18, color: "#F8C700", img: "./assets/models/px_ai4_2.7/front.png", imgL: "./assets/models/px_ai4_2.7/left.png", imgR: "./assets/models/px_ai4_2.7/right.png", imgB: "./assets/models/px_ai4_2.7/back.png", imgT: "./assets/models/px_ai4_2.7/top.png" },
                { name: "全聯 Ai4-2.1", w: 2.083, h: 2.2, d: 1.129, color: "#F8C700", img: "./assets/models/px_ai4_2.1/front.png", imgL: "./assets/models/px_ai4_2.1/left.png", imgR: "./assets/models/px_ai4_2.1/right.png", imgB: "./assets/models/px_ai4_2.1/back.png", imgT: "./assets/models/px_ai4_2.1/top.png" },
                { name: "全聯 Ai4-1.8", w: 1.803, h: 2.2, d: 1.129, color: "#F8C700", img: "./assets/models/px_ai4_1.8/front.png", imgL: "./assets/models/px_ai4_1.8/left.png", imgR: "./assets/models/px_ai4_1.8/right.png", imgB: "./assets/models/px_ai4_1.8/back.png", imgT: "./assets/models/px_ai4_1.8/top.png" },
                { name: "全聯 Ai4-單機", w: 0.88, h: 1.891, d: 0.897, color: "#F8C700", img: "./assets/models/px_ai4_single/front.png", imgL: "./assets/models/px_ai4_single/left.png", imgR: "./assets/models/px_ai4_single/right.png", imgB: "./assets/models/px_ai4_single/back.png", imgT: "./assets/models/px_ai4_single/top.png", hasCap:true, capW:0.235, capH:0.93, capD:0.897, capImg:"./assets/models/px_ai4_cap/front.png", capImgL: "./assets/models/px_ai4_cap/left.png", capImgR: "./assets/models/px_ai4_cap/right.png", capImgB: "./assets/models/px_ai4_cap/back.png" },
                { name: "特力屋 Ai4-2.7", w: 2.683, h: 2.2, d: 1.18, color: "#F8C700", img: "./assets/models/tlw_ai4_2.7/front.png", imgL: "./assets/models/tlw_ai4_2.7/left.png", imgR: "./assets/models/tlw_ai4_2.7/right.png", imgB: "./assets/models/tlw_ai4_2.7/back.png", imgT: "./assets/models/tlw_ai4_2.7/top.png" },
                { name: "洗寶便利家 v1", w: 0.85, h: 1.8, d: 0.67, color: "#CCE0ED", img: "./assets/models/refill_v1/front.png", imgL: "./assets/models/refill_v1/left.png", imgR: "./assets/models/refill_v1/right.png", imgB: "./assets/models/refill_v1/back.png", imgT: "./assets/models/refill_v1/top.png" },
                { name: "水精靈便利家 v2", w: 0.88, h: 1.9, d: 0.85, color: "#000000", img: "./assets/models/refill_v2/front.png", imgL: "./assets/models/refill_v2/left.png", imgR: "./assets/models/refill_v2/right.png", imgB: "./assets/models/refill_v2/back.png", imgT: "./assets/models/refill_v2/top.png" }
            ];
            showModel(0);
        }

        function showModel(index) {
            if (index < 0) index = models.length - 1;
            if (index >= models.length) index = 0;
            currentIndex = index;

            const def = models[currentIndex];
            document.getElementById('model-name').textContent = def.name;
            document.getElementById('model-dim').textContent = `${def.w}m x ${def.h}m x ${def.d}m`;
            document.getElementById('status').innerHTML = "正在加載貼圖...";

            if (currentMesh) scene.remove(currentMesh);

            const group = new THREE.Group();
            const textureLoader = new THREE.TextureLoader();
            const themeColor = new THREE.Color(def.color || "#888888");

            // 1. 主機身
            const mainMaterials = [];
            const mainFaceConfigs = [
                { src: def.imgR || def.img, color: 0xffffff }, // 右
                { src: def.imgL || def.img, color: 0xffffff }, // 左
                { src: def.imgT || null, color: themeColor },  // 上
                { src: null, color: themeColor },              // 下
                { src: def.img, color: 0xffffff },             // 正
                { src: def.imgB || null, color: themeColor }   // 背
            ];

            let loadedCount = 0;
            mainFaceConfigs.forEach((config, i) => {
                if (config.src) {
                    textureLoader.load(config.src, (tex) => {
                        tex.colorSpace = THREE.SRGBColorSpace;
                        mainMaterials[i] = new THREE.MeshBasicMaterial({ map: tex, transparent: true, alphaTest: 0.1 });
                        checkReady();
                    });
                } else {
                    mainMaterials[i] = new THREE.MeshBasicMaterial({ color: config.color });
                    checkReady();
                }
            });

            // 2. 瓶蓋箱
            // 2. 瓶蓋箱
            if (def.hasCap && def.capImg) {
                const capMaterials = [];
                const capFaceConfigs = [
                    { src: def.capImgR || def.capImg, color: 0xffffff }, // 右
                    { src: def.capImgL || def.capImg, color: 0xffffff }, // 左
                    { src: def.capImgT || null, color: themeColor },     // 上
                    { src: null, color: themeColor },                  // 下
                    { src: def.capImg, color: 0xffffff },              // 正
                    { src: def.capImgB || null, color: themeColor }      // 背
                ];
                capFaceConfigs.forEach((config, i) => {
                    if (config.src) {
                        textureLoader.load(config.src, (tex) => {
                            tex.colorSpace = THREE.SRGBColorSpace;
                            capMaterials[i] = new THREE.MeshBasicMaterial({ map: tex, transparent: true, alphaTest: 0.1 });
                            checkReady();
                        });
                    } else {
                        capMaterials[i] = new THREE.MeshBasicMaterial({ color: config.color });
                        checkReady();
                    }
                });

                const capGeo = new THREE.BoxGeometry(def.capW, def.capH, def.capD);
                capGeo.translate(0, def.capH / 2, 0);
                const capMesh = new THREE.Mesh(capGeo, capMaterials);
                
                // 水平對齊與正面對齊
                capMesh.position.x = (def.w / 2) + (def.capW / 2);
                capMesh.position.z = (def.d / 2) - (def.capD / 2);
                group.add(capMesh);
            }

            function checkReady() {
                loadedCount++;
                const target = (def.hasCap && def.capImg) ? 12 : 6;
                if (loadedCount === target) {
                    const mainGeo = new THREE.BoxGeometry(def.w, def.h, def.d);
                    mainGeo.translate(0, def.h / 2, 0);
                    const mainMesh = new THREE.Mesh(mainGeo, mainMaterials);
                    group.add(mainMesh);
                    
                    currentMesh = group;
                    scene.add(currentMesh);
                    document.getElementById('status').innerHTML = "✅ 加載完成";
                    document.getElementById('status').style.color = "#00ff00";
                }
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            // 若有開啟 damping，必須在迴圈內 update
            if (controls) controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>

</html>
