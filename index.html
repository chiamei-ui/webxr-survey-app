<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>場勘 App (WebXR)</title>
  <link rel="stylesheet" href="style.css">
  <!-- 引入 Three.js -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>

<body>
  <!-- 第 1 層: 初始化設定介面 -->
  <div id="setup-ui" class="overlay setup-panel">
    <h1>WebXR 場勘系統</h1>
    <div class="form-group">
      <label for="site-name">站點名稱:</label>
      <input type="text" id="site-name" placeholder="請輸入站點名稱 (如: 台北信義威秀)">
    </div>

    <div class="form-group">
      <label>GPS 座標 (自動取得):</label>
      <div id="gps-status">等待授權中...</div>
    </div>

    <div class="form-group">
      <label>選擇機台型號 (多選):</label>
      <div id="model-list">

        <details class="model-group" open>
          <summary>Ai4-標準款 (免換袋/單機)</summary>
          <div class="model-group-content">
            <label><input type="checkbox" value="Ai4-1.8" data-w="180.3" data-h="220" data-d="112.9" data-color="#F8C700"
                data-img="./assets/models/ai4_1.8/front.png" data-img-l="./assets/models/ai4_1.8/left.png"
                data-img-r="./assets/models/ai4_1.8/right.png" data-img-b="./assets/models/ai4_1.8/back.png"
                data-img-t="./assets/models/ai4_1.8/top.png" class="machine-check"> Ai4-免換袋 1.8</label>
            <label><input type="checkbox" value="Ai4-2.1" data-w="208.3" data-h="220" data-d="112.9" data-color="#F8C700"
                data-img="./assets/models/ai4_2.1/front.png" data-img-l="./assets/models/ai4_2.1/left.png"
                data-img-r="./assets/models/ai4_2.1/right.png" data-img-b="./assets/models/ai4_2.1/back.png"
                data-img-t="./assets/models/ai4_2.1/top.png" class="machine-check"> Ai4-免換袋 2.1</label>
            <label><input type="checkbox" value="Ai4-2.7" data-w="268.3" data-h="220" data-d="118" data-color="#F8C700"
                data-img="./assets/models/ai4_2.7/front.png" data-img-l="./assets/models/ai4_2.7/left.png"
                data-img-r="./assets/models/ai4_2.7/right.png" data-img-b="./assets/models/ai4_2.7/back.png"
                data-img-t="./assets/models/ai4_2.7/top.png" class="machine-check"> Ai4-免換袋 2.7</label>
            <label><input type="checkbox" value="Ai4-Single" data-w="88" data-h="189.1" data-d="89.7" data-color="#EA5106"
                data-img="./assets/models/ai4_single/front.png" data-img-l="./assets/models/ai4_single/left.png"
                data-img-r="./assets/models/ai4_single/right.png" data-img-b="./assets/models/ai4_single/back.png"
                data-img-t="./assets/models/ai4_single/top.png" 
                data-cap-w="23.5" data-cap-h="93" data-cap-d="30.5" data-cap-img="./assets/models/ai4_cap/front.png"
                data-cap-img-l="./assets/models/ai4_cap/left.png" data-cap-img-r="./assets/models/ai4_cap/right.png"
                data-cap-img-b="./assets/models/ai4_cap/back.png" data-cap-img-t="./assets/models/ai4_cap/top.png" class="machine-check"> Ai4-單機</label>
            <label class="cap-option"><input type="checkbox" class="cap-check"> + 瓶蓋箱(Cap)</label>
          </div>
        </details>

        <details class="model-group">
          <summary>Ai4-全聯款 (PX系列)</summary>
          <div class="model-group-content">
            <label><input type="checkbox" value="PX-1.8" data-w="180.3" data-h="220" data-d="112.9" data-color="#F8C700"
                data-img="./assets/models/px_ai4_1.8/front.png" data-img-l="./assets/models/px_ai4_1.8/left.png"
                data-img-r="./assets/models/px_ai4_1.8/right.png" data-img-b="./assets/models/px_ai4_1.8/back.png" 
                data-img-t="./assets/models/px_ai4_1.8/top.png" class="machine-check"> 全聯 Ai4-1.8</label>
            <label><input type="checkbox" value="PX-2.1" data-w="208.3" data-h="220" data-d="112.9" data-color="#F8C700"
                data-img="./assets/models/px_ai4_2.1/front.png" data-img-l="./assets/models/px_ai4_2.1/left.png"
                data-img-r="./assets/models/px_ai4_2.1/right.png" data-img-b="./assets/models/px_ai4_2.1/back.png" 
                data-img-t="./assets/models/px_ai4_2.1/top.png" class="machine-check"> 全聯 Ai4-2.1</label>
            <label><input type="checkbox" value="PX-2.7" data-w="268.3" data-h="220" data-d="118" data-color="#F8C700"
                data-img="./assets/models/px_ai4_2.7/front.png" data-img-l="./assets/models/px_ai4_2.7/left.png"
                data-img-r="./assets/models/px_ai4_2.7/right.png" data-img-b="./assets/models/px_ai4_2.7/back.png" 
                data-img-t="./assets/models/px_ai4_2.7/top.png" class="machine-check"> 全聯 Ai4-2.7</label>
            <label><input type="checkbox" value="PX-Single" data-w="88" data-h="189.1" data-d="89.7" data-color="#F8C700"
                data-img="./assets/models/px_ai4_single/front.png" data-img-l="./assets/models/px_ai4_single/left.png"
                data-img-r="./assets/models/px_ai4_single/right.png" data-img-b="./assets/models/px_ai4_single/back.png" 
                data-img-t="./assets/models/px_ai4_single/top.png"
                data-cap-w="23.5" data-cap-h="93" data-cap-d="89.7" data-cap-img="./assets/models/px_ai4_cap/front.png"
                data-cap-img-l="./assets/models/px_ai4_cap/left.png" data-cap-img-r="./assets/models/px_ai4_cap/right.png"
                data-cap-img-b="./assets/models/px_ai4_cap/back.png" class="machine-check"> 全聯 Ai4-單機</label>
            <label class="cap-option"><input type="checkbox" class="cap-check"> + 瓶蓋箱(Cap)</label>
          </div>
        </details>

        <details class="model-group">
          <summary>特力屋 & 其他整合機</summary>
          <div class="model-group-content">
            <label><input type="checkbox" value="TLW-2.7" data-w="268.3" data-h="220" data-d="118" data-color="#F8C700"
                data-img="./assets/models/tlw_ai4_2.7/front.png" data-img-l="./assets/models/tlw_ai4_2.7/left.png"
                data-img-r="./assets/models/tlw_ai4_2.7/right.png" data-img-b="./assets/models/tlw_ai4_2.7/back.png"
                data-img-t="./assets/models/tlw_ai4_2.7/top.png" class="machine-check"> 特力屋 Ai4-2.7</label>
            <label><input type="checkbox" value="H30" data-w="121" data-h="205" data-d="90.8" data-color="#F8C700"
                data-img="./assets/models/h30/front.png" data-img-l="./assets/models/h30/left.png"
                data-img-r="./assets/models/h30/right.png" data-img-b="./assets/models/h30/back.png"
                data-img-t="./assets/models/h30/top.png" class="machine-check"> H30 整合機</label>
          </div>
        </details>

        <details class="model-group">
          <summary>台塑便利家 (洗寶/水精靈)</summary>
          <div class="model-group-content">
            <label><input type="checkbox" value="Refill-v1" data-w="85" data-h="180" data-d="67" data-color="#CCE0ED"
                data-img="./assets/models/refill_v1/front.png" data-img-l="./assets/models/refill_v1/left.png"
                data-img-r="./assets/models/refill_v1/right.png" data-img-b="./assets/models/refill_v1/back.png"
                data-img-t="./assets/models/refill_v1/top.png" class="machine-check"> 洗寶 (refill_v1)</label>
            <label><input type="checkbox" value="Refill-v2" data-w="88" data-h="190" data-d="85" data-color="#000000"
                data-img="./assets/models/refill_v2/front.png" data-img-l="./assets/models/refill_v2/left.png"
                data-img-r="./assets/models/refill_v2/right.png" data-img-b="./assets/models/refill_v2/back.png"
                data-img-t="./assets/models/refill_v2/top.png" class="machine-check"> 水精靈 (refill_v2)</label>
          </div>
        </details>

        <details class="model-group">
          <summary>電池機系列</summary>
          <div class="model-group-content">
            <label><input type="checkbox" value="Battery-v2" data-w="41" data-h="162.3" data-d="47.8"
                data-color="#E9CA4D" data-img="./assets/models/battery_v2/front.png" data-img-l="./assets/models/battery_v2/left.png"
                data-img-r="./assets/models/battery_v2/right.png" data-img-b="./assets/models/battery_v2/back.png"
                data-img-t="./assets/models/battery_v2/top.png" class="machine-check"> 電池機 v2</label>
            <label><input type="checkbox" value="Battery-v3-In" data-w="41" data-h="175" data-d="34" data-color="#FFFFFF"
                data-img="./assets/models/battery_v3_in/front.png" data-img-l="./assets/models/battery_v3_in/left.png"
                data-img-r="./assets/models/battery_v3_in/right.png" data-img-b="./assets/models/battery_v3_in/back.png"
                data-img-t="./assets/models/battery_v3_in/top.png" class="machine-check"> 電池機 v3 (室內)</label>
            <label><input type="checkbox" value="Battery-v3-Out" data-w="41" data-h="175" data-d="34" data-color="#FFFFFF"
                data-img="./assets/models/battery_v3_out/front.png" data-img-l="./assets/models/battery_v3_out/left.png"
                data-img-r="./assets/models/battery_v3_out/right.png" data-img-b="./assets/models/battery_v3_out/back.png"
                data-img-t="./assets/models/battery_v3_out/top.png" class="machine-check"> 電池機 v3 (室外)</label>
          </div>
        </details>
        
        <button id="btn-view-dimensions" class="action-btn secondary" style="width: 100%; margin-top: 10px;">📏 查看機台尺寸</button>
      </div>
    </div>

    <div class="form-group">
      <div class="btn-group-vertical">
        <!-- WebXR AR 按鈕容器 (Three.js 在此生成按鈕) -->
        <div id="ar-button-container"></div>
        <div id="ios-hint" class="hidden" style="color: #ff4444; margin-top: 10px; font-size: 0.9em; text-align: center;">
          ⚠️ 您的裝置或瀏覽器不支援 WebXR (AR)。<br>
          請使用 Android Chrome 或 iOS WebXR Viewer。
        </div>

        <div class="divider"><span>或</span></div>

        <!-- 獨立的拍照按鈕 -->
        <button id="btn-photo-capture" class="action-btn upload">📷 立即拍照合成</button>

        <!-- 獨立的匯入按鈕 -->
        <button id="btn-photo-import" class="action-btn secondary">🖼️ 從相簿匯入舊照</button>
        <input type="file" id="image-upload" accept="image/*" class="hidden">
      </div>
    </div>
  </div>

    <!-- 第 2-B 層: 舊照合成 UI (新功能) -->
  <div id="photo-ar-ui" class="overlay hidden">

    <!-- 畫線透視用 SVG 疊加層 -->
    <svg id="draw-svg" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 60;">
      <line id="line-width" stroke="#ffff00" stroke-width="4" stroke-dasharray="6,6" stroke-linecap="round" visibility="hidden" />
      <line id="line-depth" stroke="#00ffff" stroke-width="4" stroke-dasharray="6,6" stroke-linecap="round" visibility="hidden" />
      <line id="line-height" stroke="#00ff00" stroke-width="4" stroke-dasharray="6,6" stroke-linecap="round" visibility="hidden" />
    </svg>
    
    <!-- 透視畫線操作提示 -->
    <div id="perspective-hint" class="hint-toast hidden">請畫出機台底部【寬度線】(例如向右拉作正面)</div>

    <!-- 這裡會用 Three.js 在背後繪製圖片與機台 -->
    <div id="photo-watermark-preview" class="watermark-overlay">
      <span id="photo-wm-site">站點: N/A</span><br>
      <span id="photo-wm-gps">GPS: N/A</span><br>
      <span id="photo-wm-time"></span>
    </div>

    <!-- 右上角工具列疊加層 -->
    <div class="top-right-tools" id="photo-tools-panel">
      <button id="btn-mode-move" class="tool-btn highlight">👆 移動機台</button>
      <button id="btn-mode-rotate" class="tool-btn">🔄 旋轉機台</button>

      <div class="tool-row">
        <button id="btn-scale-up" class="tool-btn half">➕ 放大</button>
        <button id="btn-scale-down" class="tool-btn half">➖ 縮小</button>
      </div>

      <button id="btn-force-rotate" class="tool-btn">⤻ 轉90度</button>
      <button id="btn-reorder-models" class="tool-btn highlight">🔁 變換順序</button>
      <button id="btn-reset-machine" class="tool-btn secondary">🔙 重整機台</button>
    </div>

    <div class="bottom-right-tools">
      <button id="btn-mode-perspective" class="tool-btn highlight" style="background-color:#9c27b0; border-color:#e1bee7;">📐 透視畫線</button>
    </div>

    <div class="bottom-bar">
      <button id="btn-photo-shutter" class="shutter-btn"></button>
    </div>
  </div>

  <!-- 第 2 層: AR 拍攝介面 -->
  <div id="ar-ui" class="overlay hidden">
    <div id="watermark-preview">
      <span id="wm-site">站點: N/A</span><br>
      <span id="wm-gps">GPS: N/A</span><br>
      <span id="wm-time"></span>
    </div>

    <!-- 水平儀 UI -->
    <div id="level-ui">
      <!-- 水平參考線 -->
      <div id="level-x-axis" class="axis"></div>
      <div id="level-y-axis" class="axis"></div>
      <!-- 會移動的氣泡點 -->
      <div id="level-bubble"></div>
    </div>

    <div class="bottom-bar">
      <button id="btn-shutter" class="shutter-btn"></button>
    </div>
  </div>

  <!-- 第 3 層: 拍完後的接續畫面 -->
  <div id="post-ar-ui" class="overlay hidden setup-panel">
    <h2>拍攝完成！照片已下載</h2>
    <p>照片包含 AR 合成圖 (已押上浮水印)。</p>
    <div class="btn-group">
      <button id="btn-continue" class="action-btn">維持同機型拍攝下一張</button>
      <button id="btn-restart" class="action-btn secondary">更換機型 / 結束</button>
    </div>
  </div>
  <!-- 原生 HTML 圖片畫布 (永遠放在最底層) -->
  <img id="native-photo-bg" crossorigin="anonymous" class="hidden">

  <script type="module" src="app.js"></script>
</body>

</html>
